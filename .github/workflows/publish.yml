name: Publish to PyPI

on:
  push:
    branches:
      - prod
    paths:
      - "CHANGELOG.md"

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.version_changed }}
      new_version: ${{ steps.check.outputs.new_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check if version changed
        id: check
        run: |
          CURRENT_VERSION=$(grep -oP '(?<=^## \[)\d+\.\d+\.\d+(?=\])' CHANGELOG.md | head -n 1)
          PROJECT_VERSION=$(grep -oP '(?<=^version = ")[^"]+' pyproject.toml | head -n 1)

          git fetch origin tag "v$CURRENT_VERSION" --no-tags || true
          if git rev-parse "v$CURRENT_VERSION" >/dev/null 2>&1; then
            echo "⏭️ Tag v$CURRENT_VERSION already exists. Skipping publish."
            echo "version_changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "$CURRENT_VERSION" != "$PROJECT_VERSION" ]; then
            echo "❌ Version mismatch: CHANGELOG.md ($CURRENT_VERSION) != pyproject.toml ($PROJECT_VERSION)"
            exit 1
          fi

          echo "version_changed=true" >> $GITHUB_OUTPUT
          echo "new_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "✅ Versions match ($CURRENT_VERSION) and tag does not exist. Triggering publish pipeline."

  publish:
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          python-version: "3.14"
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish

      - name: Generate Release Body
        id: release_body
        run: |
          VERSION="v${{ needs.check-version.outputs.new_version }}"
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)

          awk '/^## \[/ { if (p) exit; p=1; next } p { print }' CHANGELOG.md > release_notes.md

          sed -i -e :a -e '/^\n*$/{$d;N;ba' -e '}' release_notes.md

          echo "" >> release_notes.md
          echo "<details>" >> release_notes.md
          echo "<summary><b>📦 Commits History (${PREVIOUS_TAG} &rarr; ${VERSION})</b></summary>" >> release_notes.md
          echo "" >> release_notes.md
          git log --date=iso-strict --pretty=format:"- %ad - %s [\`%h\`](https://github.com/${{ github.repository }}/commit/%H)" $PREVIOUS_TAG..HEAD | tac >> release_notes.md
          echo "" >> release_notes.md
          echo "</details>" >> release_notes.md
          echo "" >> release_notes.md

          AUTHORS=$(git log $PREVIOUS_TAG..HEAD --format='%ae' | sort -u)

          echo "### 👥 Contributors" >> release_notes.md
          echo "" >> release_notes.md

          for email in $AUTHORS; do
            # Use GitHub API search to find the user by email (or default to author name if email fails)
            GH_USER=$(curl -s "https://api.github.com/search/users?q=$email" | grep -oP '"login": "\K[^"]+' | head -1)

            if [ -n "$GH_USER" ]; then
              echo "<a href=\"https://github.com/$GH_USER\"><img src=\"https://github.com/$GH_USER.png?size=40\" width=\"40\" height=\"40\" alt=\"@$GH_USER\" style=\"border-radius: 50%; padding: 2px\" /></a>" >> release_notes.md
            fi
          done

          echo "" >> release_notes.md

          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREVIOUS_TAG...$VERSION" >> release_notes.md

          {
            echo "notes<<EOF"
            cat release_notes.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.new_version }}
          name: v${{ needs.check-version.outputs.new_version }}
          body: ${{ steps.release_body.outputs.notes }}
          files: |
            dist/*.whl
            dist/*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
